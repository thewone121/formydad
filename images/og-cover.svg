<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Pentium Chambers — Legal Practitioners and Consultants">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e2338"/>
      <stop offset="0.6" stop-color="#0a1e33"/>
      <stop offset="1" stop-color="#081625"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#c2a25c" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#c2a25c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="6" fill="#c2a25c"/>

  <!-- Emblem -->
  <g transform="translate(96 150)">
    <path d="M40 0 L74 26 L61 64 L19 64 L6 26 Z" fill="none" stroke="#c2a25c" stroke-width="2"/>
    <path d="M40 16 L40 50" stroke="#f1e9d6" stroke-width="4" stroke-linecap="round"/>
    <path d="M31 18 L49 18" stroke="#f1e9d6" stroke-width="4" stroke-linecap="round"/>
    <path d="M29 50 L51 50" stroke="#f1e9d6" stroke-width="4" stroke-linecap="round"/>
    <path d="M40 5 l5 5 -5 5 -5 -5 z" fill="#c2a25c"/>
  </g>

  <text x="200" y="205" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="600" letter-spacing="6">PENTIUM CHAMBERS</text>
  <text x="202" y="238" fill="#a9b6c6" font-family="'Courier New', monospace" font-size="16" letter-spacing="7">LEGAL PRACTITIONERS &amp; CONSULTANTS</text>

  <text x="96" y="360" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="600">Enduring Counsel.</text>
  <text x="96" y="440" fill="#d7c193" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="600" font-style="italic">Modern Practice.</text>

  <text x="96" y="520" fill="#c2ccd9" font-family="Georgia, serif" font-size="26">Abuja-based commercial law firm · Established 2001 · Two decades of counsel</text>

  <text x="96" y="588" fill="#8595a8" font-family="'Courier New', monospace" font-size="16" letter-spacing="3">LITIGATION · CORPORATE · BANKING · ARBITRATION · TECHNOLOGY LAW</text>
</svg>
